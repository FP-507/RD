# Configuración de despliegue para Render (render.com)
# Render lee este archivo automáticamente al conectar el repo.
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: readworks-agent
    runtime: python
    buildCommand: pip install -r requirements-prod.txt && python -m playwright install chromium && python -m playwright install-deps chromium
    # --workers=1 --threads=8: necesario para que SSE funcione correctamente.
    # --timeout=300: evita que Render corte conexiones largas del agente.
    startCommand: gunicorn app:app --workers=1 --threads=8 --timeout=300 --bind 0.0.0.0:$PORT
    envVars:
      - key: HEADLESS
        value: "true"         # En servidor siempre headless (no hay pantalla)
      - key: AUTO_SUBMIT
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ANTHROPIC_API_KEY
        sync: false           # El usuario la configura manualmente en el dashboard de Render
